services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: barcode_db
    ports:
      - "5433:5432"
    volumes:
      - qazpost_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d barcode_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/barcode_db
      SECRET_KEY: docker-dev-secret
      DEJAVU_SANS_FONT_PATH: /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf
    ports:
      - "8000:8000"
    command:
      - sh
      - -c
      - |
        set -e
        python - <<'PY'
        import asyncio
        import os

        import asyncpg


        async def main() -> None:
            database_url = os.environ["DATABASE_URL"].replace(
                "postgresql+asyncpg://",
                "postgresql://",
                1,
            )
            connection = await asyncpg.connect(database_url)
            await connection.execute(
                "CREATE TABLE IF NOT EXISTS alembic_version "
                "(version_num VARCHAR(255) NOT NULL)"
            )
            await connection.execute(
                "ALTER TABLE alembic_version "
                "ALTER COLUMN version_num TYPE VARCHAR(255)"
            )
            await connection.close()


        asyncio.run(main())
        PY
        alembic upgrade head &&
        python -m app.db.seed &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  qazpost_db_data:
